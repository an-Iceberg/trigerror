out_dir = .
; interfaces = wlan0, eth0, lo
interfaces = enp0s13f0u3u2i5

# TODO: this should be a BPF compliant string
# TODO: test dns
# Example to filter for only PTP packages: ether proto 0x88f7
filter = ether proto 0x88f7

count_before = 100
time_before = 50_000
count_after = 100
time_after = 50_000

retrigger = false
max_retriggers = 10
; TODO: max file size (calculate from packets captured)
file_size = 1
# Variants: txt, text, csv, json; case insensitive
out_format = txt
